services:
  mongodb:
    image: mongo:7
    container_name: bildyapp-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
  postgres:
    image: postgres:16-alpine
    container_name: bildyapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bildyapp_audit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bildyapp-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_URI: mongodb://mongodb:27017
      DB_NAME: bildyapp
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bildyapp_audit
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/bildyapp_audit
      JWT_SECRET: ${JWT_SECRET}
      SLACK_WEBHOOK: ${SLACK_WEBHOOK}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    depends_on:
      - mongodb
      - postgres

volumes:
  mongodb_data:
  postgres_data: